<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
</head>
<body style="background-color: #121212; color: #00ff00; font-family: monospace; font-size: 16px; padding: 10px;">
    
    <b>Monitor de Diagnóstico v1.x</b><br>
    <div id="consola">-> Iniciando motor MQTT.js...</div>

    <script>
        function logMsg(texto) {
            document.getElementById("consola").innerHTML += "<br>-> " + texto;
            if(typeof window.AppInventor !== "undefined") {
                window.AppInventor.setWebViewString(texto);
            }
        }

        window.onload = function() {
            try {
                var clientId = "App_Diag_" + Math.random().toString(16).substr(2, 8);
                logMsg("Conectando a HiveMQ por WSS...");

                // Conexión directa y encriptada (WebSockets Secure)
                var client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
                    clientId: clientId,
                    keepalive: 10,
                    reconnectPeriod: 5000 // Intenta reconectar solo si la app pierde el internet
                });

                // Evento: Al conectar con éxito
                client.on('connect', function () {
                    logMsg("EXITO: Conectado a HiveMQ");
                    // Asegúrate de que este canal sea el mismo que usa tu ESP32
                    client.subscribe("proyecto/ESP-8E50/status");
                    logMsg("-> Sistema Listo y Escuchando");
                });

                // Evento: Al recibir un mensaje del ESP32
                client.on('message', function (topic, message) {
                    logMsg(message.toString());
                });

                // Evento: Si el túnel se cae
                client.on('offline', function () {
                    logMsg("DESCONECTADO: Enlace perdido");
                });

                // Evento: Si hay un fallo de red
                client.on('error', function (error) {
                    logMsg("ERROR MQTT: " + error.message);
                });

                // Función que ejecuta tu Botón 2 en App Inventor
                window.publicarPrueba = function() {
                    if(client.connected) {
                        client.publish("proyecto/app/prueba", "App conectada y transmitiendo");
                        logMsg("ENVIADO: Pulso manual de prueba");
                    } else {
                        logMsg("ERROR: No hay túnel hacia el servidor");
                    }
                };

            } catch (errorInterno) {
                logMsg("ERROR JS: " + errorInterno.message);
            }
        };
    </script>
</body>
</html>

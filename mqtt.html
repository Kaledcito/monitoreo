<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
</head>
<body style="background-color: #121212; color: #00ff00; font-family: monospace; font-size: 18px; padding: 10px;">
    
    <b>Monitor de Diagnóstico IoT v1.x</b><br>
    <div id="consola">-> Iniciando sistema...</div>

    <script>
        // Función que imprime en la pantalla HTML y también envía a App Inventor
        function logMsg(texto) {
            document.getElementById("consola").innerHTML += "<br>-> " + texto;
            // Si detecta que está dentro de App Inventor, le avisa a los bloques
            if(typeof window.AppInventor !== "undefined") {
                window.AppInventor.setWebViewString(texto);
            }
        }
        
        var clientId = "App_Senati_" + Math.random().toString(16).substr(2, 6);
        logMsg("ID Generado: " + clientId);
        logMsg("Conectando a broker.hivemq.com:8884...");

        var client = new Paho.MQTT.Client("broker.hivemq.com", 8884, "/mqtt", clientId);

        client.onConnectionLost = function(res) { 
            logMsg("ERROR: Conexión perdida. " + res.errorMessage); 
        };
        
        client.onMessageArrived = function(msg) { 
            logMsg("RECEPTOR: " + msg.payloadString); 
        };

        var options = {
            useSSL: true,
            timeout: 5,
            keepAliveInterval: 10,
            onSuccess: function() {
                logMsg("EXITO: Conectado a HiveMQ");
                client.subscribe("proyecto/ESP-8E50/status");
                logMsg("Suscrito al canal de estado");
            },
            onFailure: function(error) { 
                logMsg("FALLO CRÍTICO: " + error.errorMessage); 
            }
        };

        client.connect(options);

        function publicarPrueba() {
            if(client.isConnected()) {
                var msj = new Paho.MQTT.Message("App conectada y transmitiendo");
                msj.destinationName = "proyecto/app/prueba";
                client.send(msj);
                logMsg("ENVIADO: Mensaje de prueba a la nube");
            } else {
                logMsg("ERROR: No se puede enviar, no hay conexión");
            }
        }
    </script>
</body>
</html>

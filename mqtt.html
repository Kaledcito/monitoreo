<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://broker.hivemq.com">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
</head>
<body>
    <script>
        // OPTIMIZACIÓN 2: Transmisión directa a la memoria nativa, sin tocar la interfaz gráfica
        function enviarApp(texto) {
            if(typeof window.AppInventor !== "undefined") {
                window.AppInventor.setWebViewString(texto);
            }
        }

        // OPTIMIZACIÓN 3: Ejecución inmediata sin esperar al window.onload
        function arrancarMotor() {
            try {
                var clientId = "App_Diag_" + Math.random().toString(16).substr(2, 6);
                
                var client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
                    clientId: clientId,
                    keepalive: 5,         // Reducido a 5s para detectar caídas de red más rápido
                    connectTimeout: 3000, // Si falla, aborta rápido sin quedarse congelado
                    clean: true
                });

                client.on('connect', function () {
                    // OPTIMIZACIÓN 4: QoS 0. Prioriza la velocidad de entrega en tiempo real sobre la confirmación
                    client.subscribe("proyecto/ESP-8E50/status", { qos: 0 });
                });

                client.on('message', function (topic, message) {
                    enviarApp(message.toString());
                });

                client.on('offline', function () {
                    enviarApp("Offline");
                });

            } catch (e) {
                enviarApp("Error");
            }
        }

        // Se dispara en el instante en que el navegador lee esta línea
        arrancarMotor();
    </script>
</body>
</html>

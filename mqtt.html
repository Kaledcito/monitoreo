<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    
    <script>
        if (typeof window.localStorage === 'undefined' || window.localStorage === null) {
            window.localStorage = {
                getItem: function(key) { return null; },
                setItem: function(key, val) { },
                removeItem: function(key) { },
                clear: function() { }
            };
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
</head>
<body style="background-color: #121212; color: #00ff00; font-family: monospace; font-size: 16px; padding: 10px;">
    
    <b>Monitor de Diagnóstico v1.x</b><br>
    <div id="consola">-> Esperando recursos de red...</div>

    <script>
        function logMsg(texto) {
            document.getElementById("consola").innerHTML += "<br>-> " + texto;
            if(typeof window.AppInventor !== "undefined") {
                window.AppInventor.setWebViewString(texto);
            }
        }

        window.onload = function() {
            logMsg("Librería cargada. Iniciando puente WSS...");
            
            try {
                if (typeof Paho === "undefined") {
                    logMsg("ERROR FATAL: Librería Paho no encontrada.");
                    return;
                }

                var clientId = "App_Diag_" + Math.random().toString(16).substr(2, 6);
                var client = new Paho.MQTT.Client("broker.hivemq.com", 8884, "/mqtt", clientId);

                client.onConnectionLost = function(res) { 
                    logMsg("DESCONECTADO: " + res.errorMessage); 
                };
                
                client.onMessageArrived = function(msg) { 
                    logMsg("RECEPTOR: " + msg.payloadString); 
                };

                var options = {
                    useSSL: true,
                    timeout: 5,
                    keepAliveInterval: 10,
                    onSuccess: function() {
                        logMsg("EXITO: Conectado a HiveMQ");
                        // Canal de escucha del hardware
                        client.subscribe("proyecto/ESP-8E50/status");
                        logMsg("-> Sistema Listo y Escuchando");
                    },
                    onFailure: function(error) { 
                        logMsg("FALLO CONEXIÓN: " + error.errorMessage); 
                    }
                };

                client.connect(options);
                
                window.publicarPrueba = function() {
                    if(client.isConnected()) {
                        var msj = new Paho.MQTT.Message("App conectada y transmitiendo");
                        msj.destinationName = "proyecto/app/prueba";
                        client.send(msj);
                        logMsg("ENVIADO: Pulso manual de prueba");
                    } else {
                        logMsg("ERROR: No hay túnel hacia el servidor");
                    }
                };

            } catch (errorInterno) {
                logMsg("ERROR JS: " + errorInterno.message);
            }
        };
    </script>
</body>
</html>
